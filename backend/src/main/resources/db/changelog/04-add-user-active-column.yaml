databaseChangeLog:
  - changeSet:
      id: 4
      author: bangla-lms
      preConditions:
        onFail: MARK_RAN
        not:
          columnExists:
            tableName: users
            columnName: active
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: active
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
